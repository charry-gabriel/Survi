# ─── Zone Village ───────────────────────────────────────────────────────────────
#
# Paliers de zone — triés par after-hours croissant.
#
# after-hours  : heures réelles après le début de partie avant activation du palier
# center-x/z   : centre de la zone rectangulaire pour ce palier
# half-width   : demi-largeur (axe X) en blocs depuis le centre
# half-depth   : demi-profondeur (axe Z) en blocs depuis le centre
# spawn        : coordonnées du point de spawn Village pour ce palier
# portal       : coordonnées intérieures (fakeblocks) du portail Village

stages:
  - after-hours: 0
    center-x: 0
    center-z: 0
    half-width: 10
    half-depth: 10
    spawn:
      x: 0
      y: 64
      z: 0
      yaw: 0.0
      pitch: 0.0
    portal:
      min-x: -5
      min-y: 62
      min-z: -5
      max-x: -5
      max-y: 64
      max-z: -7

  - after-hours: 0.5       # après 30 min de jeu réel
    center-x: 0
    center-z: 0
    half-width: 50
    half-depth: 50
    spawn:
      x: 10
      y: 64
      z: 10
      yaw: 0.0
      pitch: 0.0
    portal:
      min-x: -20
      min-y: 62
      min-z: -20
      max-x: -20
      max-y: 64
      max-z: -22

  - after-hours: 24         # après 24 h de jeu réel
    center-x: -76
    center-z: -83
    half-width: 200
    half-depth: 200
    spawn:
      x: -76
      y: 73
      z: -83
      yaw: 0.0
      pitch: 0.0
    portal:
      min-x: -80
      min-y: 62
      min-z: -80
      max-x: -80
      max-y: 64
      max-z: -82