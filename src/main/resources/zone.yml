# ─── Zone Village ───────────────────────────────────────────────────────────────
#
# Paliers de zone — triés par after-hours croissant.
#
# after-hours  : heures réelles après le début de partie avant activation du palier
# center-x/z   : centre de la zone rectangulaire pour ce palier
# half-width   : demi-largeur (axe X) en blocs depuis le centre
# half-depth   : demi-profondeur (axe Z) en blocs depuis le centre
# spawn        : coordonnées du point de spawn Village pour ce palier
# portal       : coordonnées intérieures (fakeblocks) du portail Village

stages:
