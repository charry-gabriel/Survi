  charcoal-chance:
    - 0.00   # niveau  0
    - 0.00   # niveau  1
    - 0.00   # niveau  2
    - 0.15   # niveau  3
    - 0.20   # niveau  4
    - 0.25   # niveau  5
    - 0.30   # niveau  6
    - 0.35   # niveau  7
    - 0.40   # niveau  8
    - 0.45   # niveau  9
    - 0.50   # niveau 10
  # Probabilité d'obtenir une pomme en cassant des feuilles de chêne/azalée
  apple-leaf-chance:
    - 0.001  # niveau  0
    - 0.002  # niveau  1
    - 0.003  # niveau  2
    - 0.005  # niveau  3
    - 0.055  # niveau  4
    - 0.085  # niveau  5
    - 0.115  # niveau  6
    - 0.155  # niveau  7
    - 0.205  # niveau  8
    - 0.275  # niveau  9
    - 0.355  # niveau 10
  # Multiplicateur appliqué aux dégâts de feu reçus (1.0 = vanilla, >1 = plus de dégâts)
  fire-damage-multiplier:
    - 2.00   # niveau  0
    - 1.75   # niveau  1
    - 1.50   # niveau  2
    - 1.25   # niveau  3
    - 1.10   # niveau  4
    - 1.00   # niveau  5  — vanilla
    - 1.00   # niveau  6
    - 1.00   # niveau  7
    - 1.00   # niveau  8
    - 1.00   # niveau  9
    - 1.00   # niveau 10
  # Logs supplémentaires abattus par le tree-feller (0 = désactivé)
  tree-feller-extra-logs:
    - 0   # niveau  0
    - 0   # niveau  1
    - 0   # niveau  2
    - 0   # niveau  3
    - 0   # niveau  4
    - 1   # niveau  5
    - 2   # niveau  6
    - 3   # niveau  7
    - 4   # niveau  8
    - 5   # niveau  9
    - 6   # niveau 10
  # Durée en ticks de la résistance au feu accordée lors d'une ignition (0 = aucune résistance)
  fire-resistance-ticks:
    - 0    # niveau  0
    - 0    # niveau  1
    - 0    # niveau  2
    - 0    # niveau  3
    - 0    # niveau  4
    - 0    # niveau  5
    - 0    # niveau  6
    - 60   # niveau  7
    - 100  # niveau  8
    - 160  # niveau  9
    - 240  # niveau 10

# ─── Fermier (FARMER) ──────────────────────────────────────────────────────────
farmer:
  # Probabilité d'autoriser un tick de croissance (niveaux 0–4 = ralentissement)
  crop-growth-allow-chance:
    - 0.05   # niveau  0  — 20× plus lent que vanilla
    - 0.15   # niveau  1
    - 0.30   # niveau  2
    - 0.50   # niveau  3
    - 0.70   # niveau  4
    - 1.00   # niveau  5  — vanilla
    - 1.00   # niveau  6
    - 1.00   # niveau  7
    - 1.00   # niveau  8
    - 1.00   # niveau  9
    - 1.00   # niveau 10
  # Probabilité d'un tick de croissance BONUS immédiatement après un tick normal (niveaux 6–10)
  crop-extra-growth-chance:
    - 0.00   # niveau  0
    - 0.00   # niveau  1
    - 0.00   # niveau  2
    - 0.00   # niveau  3
    - 0.00   # niveau  4
    - 0.00   # niveau  5
    - 0.20   # niveau  6
    - 0.40   # niveau  7
    - 0.65   # niveau  8
    - 1.00   # niveau  9
    - 1.00   # niveau 10
  # Probabilité d'un 3e tick bonus au niveau maximum (s'applique uniquement si crop-extra-growth-chance déclenche)
  crop-third-tick-chance-at-max: 0.50

# ─── Enchanteur (ENCHANTER) ─────────────────────────────────────────────────────
enchanter:
  # Multiplicateur de dégâts de durabilité (0.0 = aucun dommage, 1.0 = vanilla, >1.0 = plus de dommages)
  durability-loss-multiplier:
    - 3.00   # niveau  0
    - 2.00   # niveau  1
    - 1.50   # niveau  2
    - 1.25   # niveau  3
    - 1.00   # niveau  4  — vanilla
    - 0.75   # niveau  5
    - 0.50   # niveau  6
    - 0.25   # niveau  7
    - 0.10   # niveau  8
    - 0.00   # niveau  9
    - 0.00   # niveau 10
  # Coût XP maximum autorisé pour une opération d'enclume (-1 = illimité)
  anvil-max-xp-cost:
    - 2    # niveau  0
    - 4    # niveau  1
    - 7    # niveau  2
    - 11   # niveau  3
    - 16   # niveau  4
    - 20   # niveau  5
    - 25   # niveau  6
    - 30   # niveau  7
    - 35   # niveau  8
    - 40   # niveau  9
    - -1   # niveau 10  — illimité
  # Durabilité réparée par point d'XP gagné (0 = réparation désactivée à ce niveau)
  repair-per-xp:
    - 0   # niveau  0
    - 0   # niveau  1
    - 0   # niveau  2
    - 0   # niveau  3
    - 0   # niveau  4
    - 0   # niveau  5
    - 0   # niveau  6
    - 0   # niveau  7
    - 0   # niveau  8
    - 2   # niveau  9
    - 4   # niveau 10

# ─── Pêcheur (FISHERMAN) ──────────────────────────────────────────────────────
fisherman:
  # Fenêtre d'attente vanilla de la canne à pêche (en ticks)
  vanilla-min-wait-ticks: 100
  vanilla-max-wait-ticks: 600
  # Multiplicateur appliqué aux temps d'attente vanilla (<1.0 = plus rapide, >1.0 = plus lent)
  fishing-wait-multiplier:
    - 2.00   # niveau  0  — 2× plus long
    - 1.75   # niveau  1
    - 1.50   # niveau  2
    - 1.25   # niveau  3
    - 1.10   # niveau  4
    - 1.00   # niveau  5  — vanilla
    - 0.85   # niveau  6
    - 0.70   # niveau  7
    - 0.55   # niveau  8
    - 0.40   # niveau  9
    - 0.25   # niveau 10  — 4× plus rapide
  # Multiplicateur de loot appliqué aux items pêchés
  loot-multiplier:
    - 0.20   # niveau  0
    - 0.50   # niveau  1
    - 0.80   # niveau  2
    - 1.00   # niveau  3  — vanilla
    - 1.10   # niveau  4
    - 1.20   # niveau  5
    - 1.30   # niveau  6
    - 1.40   # niveau  7
    - 1.50   # niveau  8
    - 1.75   # niveau  9
    - 2.00   # niveau 10
  # Probabilité de remplacer l'item pêché par une dirt (s'applique à tous les loots)
  # À 0,70 au niveau 0, la chance disparaît complètement au niveau 7
  dirt-chance:
    - 0.70   # niveau  0  — 70 % de chance d'obtenir une dirt
    - 0.56   # niveau  1
    - 0.43   # niveau  2
    - 0.30   # niveau  3
    - 0.18   # niveau  4
    - 0.08   # niveau  5
    - 0.02   # niveau  6
    - 0.00   # niveau  7  — disparaît complètement
    - 0.00   # niveau  8
    - 0.00   # niveau  9
    - 0.00   # niveau 10
  # Malus supplémentaire sur les trésors (livres enchantés, arcs, cannes, selles, name tags…)
  # Appliqué uniquement si dirt-chance n'a pas déjà remplacé l'item — retour à 0 au niveau 6
  treasure-penalty:
    - 0.92   # niveau  0
    - 0.78   # niveau  1
    - 0.62   # niveau  2
    - 0.44   # niveau  3
    - 0.24   # niveau  4
    - 0.08   # niveau  5
    - 0.00   # niveau  6
    - 0.00   # niveau  7
    - 0.00   # niveau  8
    - 0.00   # niveau  9
    - 0.00   # niveau 10
  # Profondeur maximale sûre (blocs d'eau au-dessus du joueur) avant dégâts de pression
  # -1 = aucun dégât de pression à ce niveau
  pressure-safe-depth:
    - -500     # niveau  0  — tout contact avec l'eau cause des dégâts
    - 0     # niveau  1
    - 2     # niveau  2
    - 5     # niveau  3
    - 10    # niveau  4
    - 20    # niveau  5
    - 50    # niveau  6
    - 80    # niveau  7
    - 110   # niveau  8
    - 150   # niveau  9
    - -1    # niveau 10  — aucun dégât de pression
  # Dégâts infligés par la pression sous-marine (en demi-cœurs, 1.0 = 0,5 cœur)
  pressure-damage: 1.0
  # Amplificateur de vitesse de nage (DOLPHINS_GRACE) par niveau (actif à partir du niveau 3)
  swim-speed-amplifier:
    - 0   # niveau  0
    - 0   # niveau  1
    - 0   # niveau  2
    - 0   # niveau  3
    - 0   # niveau  4
    - 0   # niveau  5
    - 1   # niveau  6
    - 1   # niveau  7
    - 1   # niveau  8
    - 1   # niveau  9
    - 1   # niveau 10
  # Amplificateur de hâte sous-marine (HASTE) par niveau (actif à partir du niveau 5)
  underwater-haste-amplifier:
    - 0   # niveau  0
    - 0   # niveau  1
    - 0   # niveau  2
    - 0   # niveau  3
    - 0   # niveau  4
    - 0   # niveau  5
    - 0   # niveau  6
    - 1   # niveau  7
    - 1   # niveau  8
    - 2   # niveau  9
    - 2   # niveau 10
  # Durée en ticks des effets de potion passifs sous l'eau (légèrement > période de la tâche pour éviter le clignotement d'icône)
  effect-duration-ticks: 25

# ─── Explorateur (EXPLORER) ───────────────────────────────────────────────────
explorer:
  # Distance de chute sécurisée en blocs par niveau (aucun dégât en dessous de cette hauteur).
  # La base vanilla est 3.0 blocs. Le modifier ADD_NUMBER appliqué = valeur - 3.0.
  safe-fall-distance:
    - 0.7    # niveau  0
    - 1.7    # niveau  1
    - 2.7    # niveau  2
    - 3.7    # niveau  3
    - 4.7    # niveau  4
    - 5.7    # niveau  5
    - 6.7    # niveau  6
    - 7.7    # niveau  7
    - 8.7    # niveau  8
    - 9.7    # niveau  9
    - 10.7   # niveau 10