# yaml-language-server: $schema=../schema/quests-schema.json
quests:

  # ─────────────────── DIFFICULTÉ 2 (7/7) ───────────────────

  - id: "mine_deepslate_iron"
    name: "MINER Profond"
    description: "Minez {value} minerais de fer ardoisés."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [DEEPSLATE_IRON_ORE]
    goal: 64
    rewards:
      - {type: REPUTATION, job: MINER, value: 11}


  - id: "mine_deepslate_gold"
    name: "MINER Profond"
    description: "Minez {value} minerais d'or ardoisés."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [DEEPSLATE_GOLD_ORE]
    goal: 64
    rewards:
      - {type: REPUTATION, job: MINER, value: 11}


  - id: "mine_diamond_hunt"
    name: "Chasseur de Diamants"
    description: "Minez {value} diamants."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [DEEPSLATE_DIAMOND_ORE, DIAMOND_ORE]
    goal: 10
    rewards:
      - {type: REPUTATION, job: MINER, value: 12}

  - id: "mine_nether_quartz"
    name: "Cristaux du Nether"
    description: "Minez {value} quartz du Nether."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [NETHER_QUARTZ_ORE]
    goal: 128
    rewards:
      - {type: REPUTATION, job: MINER, value: 11}
      - { type: REPUTATION, job: EXPLORER, value: 1}
      - { type: REPUTATION, job: ENCHANTER, value: 1}

  - id: "mine_nether_gold"
    name: "Or du Royaume Infernal"
    description: "Minez {value} minerais d'or du Nether."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [NETHER_GOLD_ORE]
    goal: 64
    rewards:
      - {type: REPUTATION, job: MINER, value: 12}
      - {type: REPUTATION, job: EXPLORER, value: 2}


  - id: "mine_amethyst_geode"
    name: "Cristaux des Géodes"
    description: "Minez {value} blocs dans les géodes d'améthyste."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [AMETHYST_BLOCK]
    goal: 48
    rewards:
      - {type: REPUTATION, job: MINER, value: 13}
      - {type: REPUTATION, job: EXPLORER, value: 2}



  - id: "mine_sculk_block"
    name: "Propagation Souterraine"
    description: "Minez {value} blocs de Sculk dans le Deep Dark."
    type: MINE
    difficulty: 2
    jobs:
      - MINER
    targets: [SCULK]
    goal: 128
    rewards:
      - {type: REPUTATION, job: MINER, value: 13}
      - {type: REPUTATION, job: EXPLORER, value: 2}