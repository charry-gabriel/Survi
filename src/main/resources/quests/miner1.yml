# yaml-language-server: $schema=../schema/quests-schema.json
quests:

  # ─────────────────── DIFFICULTÉ 1 (7/7) ───────────────────

  - id: "mine_cobblestone"
    name: "MINER de Pierre"
    description: "Minez {value} blocs de stone."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [STONE]
    goal: 128
    rewards:
      - {type: REPUTATION, job: MINER, value: 11}

  - id: "mine_copper"
    name: "Collecteur de Cuivre"
    description: "Minez {value} minerais de cuivre."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [COPPER_ORE, DEEPSLATE_COPPER_ORE]
    goal: 16
    rewards:
      - {type: REPUTATION, job: MINER, value: 11}

  - id: "mine_coal"
    name: "Chercheur de Charbon"
    description: "Minez {value} minerais de charbon."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [COAL_ORE, DEEPSLATE_COAL_ORE]
    goal: 12
    rewards:
      - {type: REPUTATION, job: MINER, value: 11}
      - { type: REPUTATION, job: LUMBERJACK, value: 1 }

  - id: "mine_iron"
    name: "Prospecteur de Fer"
    description: "Minez {value} minerais de fer."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [IRON_ORE, DEEPSLATE_IRON_ORE]
    goal: 10
    rewards:
      - {type: REPUTATION, job: MINER, value: 13}

  - id: "mine_redstone"
    name: "Ingénieur Débutant"
    description: "Minez {value} minerais de redstone."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [REDSTONE_ORE, DEEPSLATE_REDSTONE_ORE]
    goal: 24
    rewards:
      - {type: REPUTATION, job: MINER, value: 13}
      - { type: REPUTATION, job: EXPLORER, value: 1}

  - id: "mine_deepslate"
    name: "Sous la Surface"
    description: "Minez {value} blocs d'ardoise des abîmes."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [DEEPSLATE]
    goal: 96
    rewards:
      - {type: REPUTATION, job: MINER, value: 15}

  - id: "mine_mixed_ores"
    name: "Veine Prometteuse"
    description: "Minez {value} minerais au dessus de la couche 0."
    type: MINE
    difficulty: 1
    jobs:
      - MINER
    targets: [GOLD_ORE, COAL_ORE, COPPER_ORE, DIAMOND_ORE, IRON_ORE, LAPIS_ORE, REDSTONE_ORE]
    goal: 64
    rewards:
      - {type: REPUTATION, job: MINER, value: 15}