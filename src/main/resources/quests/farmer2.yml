# yaml-language-server: $schema=../schema/quests-schema.json
quests:

  # ─────────────────── DIFFICULTÉ 2 (7/7) ───────────────────


  - id: "pumpkin_melon_harvest"
    name: "Champ de Citrouilles et Melon"
    description: "Récoltez {value} citrouilles et melon."
    type: HARVEST_CROP
    difficulty: 2
    jobs:
      - FARMER
    targets: [PUMPKIN, MELON]
    goal: 128
    rewards:
      - {type: REPUTATION, job: FARMER, value: 11}

  - id: "bread_craft"
    name: "Boulanger Amateur"
    description: "Fabriquez {value} pains."
    type: CRAFT
    difficulty: 2
    jobs:
      - FARMER
    targets: [ BREAD ]
    goal: 64
    rewards:
      - { type: REPUTATION, job: FARMER, value: 11}

  - id: "cake_craft"
    name: "Premiers Desserts"
    description: "Fabriquez {value} gâteaux."
    type: CRAFT
    difficulty: 2
    jobs:
      - FARMER
    targets: [ CAKE ]
    goal: 16
    rewards:
      - { type: REPUTATION, job: FARMER, value: 12}

  - id: "sugar_cane"
    name: "Production Sucrée"
    description: "Récoltez {value} cannes à sucre."
    type: MINE
    difficulty: 2
    jobs:
      - FARMER
    targets: [ SUGAR_CANE ]
    goal: 136
    rewards:
      - { type: REPUTATION, job: FARMER, value: 13}

  - id: "nether_wart_d2"
    name: "Premier Pas en Alchimie"
    description: "Récoltez {value} verrues du Nether."
    type: HARVEST_CROP
    difficulty: 2
    jobs:
      - FARMER
    targets: [ NETHER_WART ]
    goal: 128
    rewards:
      - { type: REPUTATION, job: FARMER, value: 12}
      - { type: REPUTATION, job: EXPLORER, value: 2 }

  - id: "animal_breeding"
    name: "Élevage Structuré"
    description: "Faites se reproduire {value} animaux communs."
    type: BREED
    difficulty: 2
    jobs:
      - FARMER
    targets: [ COW, SHEEP, PIG, CHICKEN ]
    goal: 100
    rewards:
      - { type: REPUTATION, job: FARMER, value: 15}

  - id: "ultimate_farmland"
    name: "Magnat de l'Agriculture"
    description: "Récoltez {value} cultures variées."
    type: HARVEST_CROP
    difficulty: 2
    jobs:
      - FARMER
    targets: [ WHEAT, CARROTS, POTATOES, BEETROOTS, PUMPKIN, MELON, SUGAR_CANE, COCOA, NETHER_WART ]
    goal: 1000
    rewards:
      - { type: REPUTATION, job: FARMER, value: 15 }