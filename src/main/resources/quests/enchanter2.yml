# yaml-language-server: $schema=../schema/quests-schema.json
quests:

# ─────────────────── DIFFICULTÉ 2 (1/7) ───────────────────

  - id: "stone_tools_enchant"
    name: "Premiers Outils Magiques"
    description: "Enchantez {value} outils en fer (épée, pioche, hache, pelle ou houe)."
    type: ENCHANT
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: [ IRON_SWORD, IRON_PICKAXE, IRON_AXE, IRON_SHOVEL, IRON_HOE ]
    goal: 10
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 1 }

  - id: "golden_experience"
    name: "Pouvoir Grandissant"
    description: "Gagnez {value} niveau d'expérience."
    type: GAIN_XP_LEVELS
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: null
    goal: 30
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 1}

  - id: "enchanted_books"
    name: "Connaissance Préservée"
    description: "Enchantez {value} livres."
    type: ENCHANT
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: [ BOOK ]
    goal: 16
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 1}
      - { type: REPUTATION, job: FARMER, value: 1 }

  - id: "craft_anvil"
    name: "Forge des Arcanes"
    description: "Craftez {value} enclume."
    type: CRAFT
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: [ ANVIL ]
    goal: 1
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 1}
      - { type: REPUTATION, job: MINER, value: 2 }

  - id: "enchant_weapons"
    name: "Lame Enchantée"
    description: "Enchantez {value} outils en diamant (épée, pioche, hache, pelle ou houe)."
    type: ENCHANT
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: [ DIAMOND_SWORD, DIAMOND_PICKAXE, DIAMOND_AXE, DIAMOND_SHOVEL, DIAMOND_HOE ]
    goal: 10
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 4}

  - id: "mine_nether_quartz2"
    name: "Cristaux Magiques"
    description: "Minez {value} minerais de quartz du Nether."
    type: MINE
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: [ NETHER_QUARTZ_ORE ]
    goal: 400
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 3}
      - { type: REPUTATION, job: MINER, value: 2 }

  - id: "full_enchanted_armor"
    name: "Armure du Mage"
    description: "Enchantez une armure en fer complète."
    type: ENCHANT
    difficulty: 2
    jobs:
      - ENCHANTER
    targets: [ IRON_HELMET, IRON_CHESTPLATE, IRON_LEGGINGS, IRON_BOOTS ]
    goal: 4
    rewards:
      - { type: REPUTATION, job: ENCHANTER, value: 4 }
      - { type: REPUTATION, job: EXPLORER, value: 1 }