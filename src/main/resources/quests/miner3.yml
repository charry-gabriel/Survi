    description: "Minez {value} blocs d'End Stone dans l'End."
    type: MINE
    difficulty: 3
    jobs:
      - MINER
    targets: [END_STONE]
    goal: 512
    rewards:
      - {type: REPUTATION, job: MINER, value: 1}

