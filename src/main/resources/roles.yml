      - { world: VILLAGE,    attribute: BLOCK_BREAK_SPEED, value:  0.1 }
      - { world: NETHER,     attribute: BLOCK_BREAK_SPEED, value:  0.2 }
      - { world: NETHER,     attribute: MOVEMENT_SPEED,    value:  0.1, operation: ADD_NUMBER }

  ENCHANTEUR:
