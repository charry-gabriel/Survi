      - { world: ALL,        attribute: LUCK,              value:  2.0, operation: ADD_NUMBER }
      - { world: ALL,        attribute: ARMOR,             value: -0.1 }
      - { world: VILLAGE,    attribute: BLOCK_BREAK_SPEED, value:  0.15 }
      - { world: END,        attribute: BLOCK_BREAK_SPEED, value:  0.25 }
      - { world: END,        attribute: MOVEMENT_SPEED,    value:  0.1, operation: ADD_NUMBER }

  NEUTRE:
