# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration principale
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Temps ──────────────────────────────────────────────────────────────────────
time:
  # Heure réelle (0–23) à laquelle le lever/coucher du soleil est simulé en jeu
  sunrise-hour: 6
  sunset-hour: 23
  # Heure réelle à laquelle le reset quotidien se déclenche (quêtes, etc.)
  daily-reset-hour: 6

# ─── Combat ─────────────────────────────────────────────────────────────────────
combat:
  # Modificateurs appliqués dans le monde normal
  normal:
    damage-modifier: 0.2
    resistance-modifier: 0.2
  # Modificateurs supplémentaires (multiplicatifs) dans l'End
  end:
    damage-modifier: 0.7
    resistance-modifier: 0.7
  # Diviseur appliqué à la vie max en fonction du nombre de morts accumulées
  # Ex : 3 morts → −floor(3 / 10) cœurs de vie max
  death-life-divisor: 10

# ─── Réputation & Rangs globaux ─────────────────────────────────────────────────
reputation:
  # Rangs débloqués selon la réputation totale (toutes guildes confondues).
  # L'id doit correspondre exactement au nom de l'entrée dans l'enum GlobalRank.
  # Doit rester trié du seuil le plus bas au plus haut.
  ranks:
    - {id: NOMADE, threshold: 0, display: "Nomade"}
    - {id: DEBUTANT, threshold: 50, display: "Débutant"}
    - {id: VILLAGEOIS, threshold: 150, display: "Villageois"}
    - {id: CITOYEN, threshold: 300, display: "Citoyen"}
    - {id: ELITE, threshold: 600, display: "Élite"}
    - {id: MAITRE, threshold: 1200, display: "Maître"}
    - {id: LEGENDE, threshold: 1800, display: "Légende"}

# ─── Métiers ────────────────────────────────────────────────────────────────────
jobs:
  # Paliers calculés depuis la réputation accumulée auprès du Trader du métier.
  # Doit rester trié du seuil le plus bas au plus haut.
  # 11 entrées = niveaux 0 à 10.
  #
  # Effets par niveau (voir JobListener.java) :
  #   MINEUR / BUCHERON  — multiplicateur drops = 0.2 + niveau × 0.18
  #     niv. 0  → ×0,20   niv. 5  → ×1,10   niv. 10 → ×2,00
  #   ENCHANTEUR — coût XP max = niveau × 3  |  niveau d'enchantement max = niveau
  #     niv. 0  → aucun enchantement
  #     niv. 1  → 3 XP max,  enchantements niv. I max
  #     niv. 3  → 9 XP max,  enchantements niv. III max (ex. Efficacité III)
  #     niv. 10 → 30 XP max, enchantements niv. X max (aucune restriction pratique)
  levels:
    - {threshold: 0}
    - {threshold: 5}
    - {threshold: 15}
    - {threshold: 35}
    - {threshold: 55}
    - {threshold: 80}
    - {threshold: 110}
    - {threshold: 150}
    - {threshold: 190}
    - {threshold: 240}
    - {threshold: 300}

# ─── Niveau du Monde ────────────────────────────────────────────────────────────
world-level:
  # Boost de rareté des mobs : base + niveau × per-level, plafonné à cap
  mob-rarity:
    base: 1.0
    per-level: 0.15
    cap: 5.0
  # Multiplicateur de difficulté des mobs : base + niveau × per-level (sans plafond)
  mob-difficulty:
    base: 1.0
    per-level: 0.05

# ─── Pluie ──────────────────────────────────────────────────────────────────────
# Mondes dans lesquels Survi prend le contrôle de la météo.
# Les transitions vanilla sont bloquées (setWeatherDuration = MAX_VALUE).
# Valeurs possibles : VILLAGE, WILDERNESS, NETHER, END
rain:
  worlds:
    - WILDERNESS

  # Durée d'un épisode de pluie en secondes.
  duration-seconds: 60

  # Intervalle avant la prochaine pluie : délai aléatoire uniforme dans [min, max].
  cooldown-min-seconds: 600
  cooldown-max-seconds: 1500