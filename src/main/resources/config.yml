# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration principale
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Temps ──────────────────────────────────────────────────────────────────────
time:
  # Heure réelle (0–23) à laquelle le lever/coucher du soleil est simulé en jeu
  sunrise-hour: 9
  sunset-hour: 0
  # Heure réelle à laquelle le reset quotidien se déclenche (quêtes, etc.)
  daily-reset-hour: 6

# ─── Combat ─────────────────────────────────────────────────────────────────────
combat:
  # Modificateurs appliqués dans le monde normal
  normal:
    damage-modifier: 0.2
    resistance-modifier: 0.2
  # Modificateurs supplémentaires (multiplicatifs) dans l'End
  end:
    damage-modifier: 0.7
    resistance-modifier: 0.7
  # Diviseur appliqué à la vie max en fonction du nombre de morts accumulées
  # Ex : 3 morts → −floor(3 / 10) cœurs de vie max
  death-life-divisor: 10

# ─── Réputation & Rangs globaux ─────────────────────────────────────────────────
reputation:
  # Rangs débloqués selon la réputation totale (toutes guildes confondues).
  # L'id doit correspondre exactement au nom de l'entrée dans l'enum GlobalRank.
  # Doit rester trié du seuil le plus bas au plus haut.
  ranks:
    - {id: INCONNU, threshold: 0, display: "Inconnu"}
    - {id: NOVICE, threshold: 50, display: "Novice"}
    - {id: APPRENTI, threshold: 150, display: "Apprenti"}
    - {id: MARCHAND, threshold: 350, display: "Marchand"}
    - {id: EXPERT, threshold: 700, display: "Expert"}
    - {id: MAITRE, threshold: 1200, display: "Maître"}
    - {id: LEGENDAIRE, threshold: 2000, display: "Légendaire"}

# ─── Métiers ────────────────────────────────────────────────────────────────────
jobs:
  # Paliers calculés depuis la réputation accumulée auprès du Trader du métier.
  # Doit rester trié du seuil le plus bas au plus haut.
  # 11 entrées = niveaux 0 à 10.
  #
  # Effets par niveau (voir JobListener.java) :
  #   MINEUR / BUCHERON  — multiplicateur drops = 0.2 + niveau × 0.18
  #     niv. 0  → ×0,20   niv. 5  → ×1,10   niv. 10 → ×2,00
  #   ENCHANTEUR — coût XP max = niveau × 3  |  niveau d'enchantement max = niveau
  #     niv. 0  → aucun enchantement
  #     niv. 1  → 3 XP max,  enchantements niv. I max
  #     niv. 3  → 9 XP max,  enchantements niv. III max (ex. Efficacité III)
  #     niv. 10 → 30 XP max, enchantements niv. X max (aucune restriction pratique)
  levels:
    - {threshold: 0, name: "Débutant"}
    - {threshold: 20, name: "Novice"}
    - {threshold: 50, name: "Apprenti"}
    - {threshold: 100, name: "Adepte"}
    - {threshold: 175, name: "Confirmé"}
    - {threshold: 280, name: "Journalier"}
    - {threshold: 420, name: "Expert"}
    - {threshold: 600, name: "Artisan"}
    - {threshold: 850, name: "Maître"}
    - {threshold: 1200, name: "Grand Maître"}
    - {threshold: 1700, name: "Légendaire"}

# ─── Niveau du Monde ────────────────────────────────────────────────────────────
world-level:
  # Boost de rareté des mobs : base + niveau × per-level, plafonné à cap
  mob-rarity:
    base: 1.0
    per-level: 0.15
    cap: 5.0
  # Multiplicateur de difficulté des mobs : base + niveau × per-level (sans plafond)
  mob-difficulty:
    base: 1.0
    per-level: 0.05
  # Poids de tirage des difficultés de quêtes selon le niveau du monde
  quest-weights:
    common:
      base: 70
      min: 30
      per-level-penalty: 2
    legendary:
      base: 5
      max: 30
      per-level-gain: 1
    # rare = 100 − common − legendary (calculé automatiquement, non configurable)

# ─── Limites Aventurier ──────────────────────────────────────────────────────────
# Rayon autorisé dans la Wilderness (et dans le Nether = rayon ÷ 8) par niveau
# du métier Aventurier (niveaux 0 à 10, doit correspondre à jobs.levels).
# Le Nether utilise le même palier divisé par 8 pour rester cohérent avec le
# ratio de coordonnées Overworld/Nether (1 bloc Nether = 8 blocs Overworld).
# L'End n'a aucune limite.
adventure-limits:
  # Rayon Wilderness en blocs (XZ) pour chaque niveau Aventurier.
  # 11 entrées = niveaux 0 → 10.
  wilderness-radius-per-level:
    - 500      # niveau  0 — Débutant
    - 750      # niveau  1 — Novice
    - 1000     # niveau  2 — Apprenti
    - 1500     # niveau  3 — Adepte
    - 2000     # niveau  4 — Confirmé
    - 3000     # niveau  5 — Journalier
    - 4000     # niveau  6 — Expert
    - 6000     # niveau  7 — Artisan
    - 8000     # niveau  8 — Maître
    - 12000    # niveau  9 — Grand Maître
    - 200000    # niveau 10 — Légendaire

# ─── Zone Village ────────────────────────────────────────────────────────────────
village-zone:
  # Centre du village (coordonnées XZ). Le rayon est mesuré depuis ce point.
  center:
    x: 0
    z: 0

  # Paliers de zone — triés par after-hours croissant.
  # after-hours : nombre d'heures réelles après le début de partie
  # radius       : rayon autorisé en blocs (horizontal, XZ)
  # portal       : coordonnées intérieures (fakeblocks) du portail Village pour ce palier
  #                min-x/y/z → max-x/y/z  (identique à la convention Wilderness)
  stages:
    - after-hours: 0
      radius: 10
      spawn:
        x: 0
        y: 64
        z: 0
        yaw: 0.0
        pitch: 0.0
      portal:
        min-x: -5
        min-y: 62
        min-z: -5
        max-x: -5
        max-y: 64
        max-z: -7

    - after-hours: 0.5       # après 1 h de jeu réel
      radius: 50
      spawn:
        x: 10
        y: 64
        z: 10
        yaw: 0.0
        pitch: 0.0
      portal:
        min-x: -20
        min-y: 62
        min-z: -20
        max-x: -20
        max-y: 64
        max-z: -22

    - after-hours: 24      # après 24 h de jeu réel
      radius: 200
      spawn:
        x: -76
        y: 73
        z: -83
        yaw: 0.0
        pitch: 0.0
      portal:
        min-x: -80
        min-y: 62
        min-z: -80
        max-x: -80
        max-y: 64
        max-z: -82