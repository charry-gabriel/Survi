        per-level: 0.25     # level 100 → 27.75
      movement-speed:
        enabled: true
        base: 0.23          # vanilla = 0.23
        per-level: 0.004    # level 100 → 0.627  (max ≈ sprint joueur = 0.32 + sprint)
      scale:
        enabled: true
        base: 1.0           # taille normale
        per-level: 0.015    # level 100 → 2.5× (géant menaçant)
      follow-range:
        enabled: true
        base: 35.0          # vanilla = 35
