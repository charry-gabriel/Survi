# ══════════════════════════════════════════════════════════════════════════════
#  monsters.yml  —  Configuration du système de niveaux de monstres
# ══════════════════════════════════════════════════════════════════════════════
#
#  PRINCIPE GÉNÉRAL
#  ─────────────────
#  • Chaque palier du monde (world level N) donne des monstres niveau
#    [N*levelsPerTier+1 … (N+1)*levelsPerTier].
#  • Les stats évoluent LINÉAIREMENT :  valeur = base + (level - 1) * per-level
#    → level 1  ≈ vanilla (base seul)
#    → level 10 = base + 9  * per-level   (fin du palier 0)
#    → level 100= base + 99 * per-level   (très puissant)
#
#  TIRAGE DU NIVEAU À L'APPARITION
#  ────────────────────────────────
#  La probabilité décroît exponentiellement avec le niveau dans le palier.
#  Formule du poids pour l'offset i (0 = niveau le plus bas du palier) :
#       weight(i) = (levelsPerTier - i) ^ spawn-weight-exponent
#  Plus l'exposant est grand, plus les élites hauts niveaux sont rares.
#  Valeur recommandée : 1.5 – 2.5
#
# ══════════════════════════════════════════════════════════════════════════════

levels-per-world-tier: 10
spawn-weight-exponent: 1.8

# ──────────────────────────────────────────────────────────────────────────────
#  STATS DISPONIBLES (section "stats" de chaque mob)
# ──────────────────────────────────────────────────────────────────────────────
#  max-health           — Points de vie maximum (cœurs × 2)
#  attack-damage        — Dégâts de base par frappe
#  movement-speed       — Vitesse de déplacement (vanilla zombie ≈ 0.23)
#  scale                — Taille relative (1.0 = normal, 2.0 = deux fois plus grand)
#  follow-range         — Distance de détection du joueur (en blocs)
#  armor                — Valeur d'armure naturelle
#  knockback-resistance — Résistance au recul (0.0–1.0)
#
#  STATS SPÉCIALES (hors section "stats")
#  explosion-radius     — Rayon d'explosion du Creeper  (entier, via setExplosionRadius)
#  fuse-ticks           — Durée de mèche du Creeper en ticks (< 30 = explosion rapide)
#  potion-effects       — Effets appliqués à l'attaque (Spider, CaveSpider…)
# ──────────────────────────────────────────────────────────────────────────────

