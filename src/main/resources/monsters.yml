  #  CREEPER  —  vitesse + rayon d'explosion + mèche
  # ════════════════════════════════════════════════
  CREEPER:
    enabled: true
    stats:
      max-health:
        enabled: true
        base: 20.0          # vanilla = 20
        per-level: 3.0
      movement-speed:
        enabled: true
