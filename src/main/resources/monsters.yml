      max-health:
        base: 6.0
        peak-ratio: 6.6667
      movement-speed:
        base: 0.25
        peak-ratio: 1.4
        tier-multiplier: 1.15
      follow-range:
        base: 16.0
        peak-ratio: 2.0
        tier-multiplier: 1.3
      scale:
        # Rétrécit progressivement → plus difficile à cibler
        # Niv 1: ×1.0   Niv 10: ×0.60   Niv 11: ×0.90 (reset)   Niv 30: ×0.49
        base: 1.0
        peak-ratio: 0.60
        tier-multiplier: 0.90

    # Rayon d'explosion (linéaire)
    # Niv 1: 3   Niv 10: 4   Niv 30: 6   (clampé à [1, 15])
    explosion-radius:
      base: 3.0
      per-level: 0.1

