        per-level: 0.005    # level 100 → 0.745 (très rapide)
      follow-range:
        enabled: true
        base: 16.0
        per-level: 0.3

    # Rayon de l'explosion (vanilla = 3)
    explosion-radius:
      enabled: true
      base: 3.0
      per-level: 0.08       # level 100 → 10.92  (énorme mais clampé à ~10 en pratique)

    # Durée de mèche en ticks avant explosion (vanilla = 30 ticks)
    # Géré par MobLevelManager via Creeper#setFuseTicks()
    fuse-ticks:
      enabled: true
      base: 30.0            # vanilla = 30 ticks
      per-level: -0.2       # level 100 → 10.2 ticks (explosion quasi-instantanée)
      min: 5                # jamais moins de 5 ticks (0.25 s) pour rester jouable

  # ════════════════════════════════════════════════
