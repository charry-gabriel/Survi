# yaml-language-server: $schema=./schema/monsters-schema.json
# ══════════════════════════════════════════════════════════════════════════════
#  monsters.yml  —  Configuration du système de niveaux de monstres
# ══════════════════════════════════════════════════════════════════════════════
#
#  PRINCIPE GÉNÉRAL
#  ─────────────────
#  • Chaque palier du monde (world level N) donne des monstres niveau
#    [N*levelsPerTier+1 … (N+1)*levelsPerTier].
#  • Les stats évoluent de manière EXPONENTIELLE PAR PALIER :
#
#      tier     = (level - 1) / levelsPerTier
#      offset   = (level - 1) mod levelsPerTier
#      t        = offset / (levelsPerTier - 1)        [0.0 → 1.0 dans le palier]
#      tierBase = base × tier-multiplier^tier
#      valeur   = tierBase × (1 + (peak-ratio - 1) × t^exponent)
#
#  EXEMPLE AVEC base=10, peak-ratio=5, tier-multiplier=2, exponent=3
#    (défauts) ET levelsPerTier=10 :
#      Niveau  1 →  10 HP  (très faible)
#      Niveau  5 →  14 HP  (courbe plus tranquille en début de palier)
#      Niveau 10 →  50 HP  (fort)
#      Niveau 11 →  20 HP  (reset doux ≈ niveau 5–6)
#      Niveau 20 → 100 HP  (très fort)
#      Niveau 21 →  40 HP  (reset doux ≈ niveau 15)
#      Niveau 30 → 200 HP  (BOSS)
#
#  PARAMÈTRES DES STATS
#  ─────────────────────
#    base            — valeur au niveau 1 (requis)
#    peak-ratio      — multiple atteint au pic de chaque palier, requis
#                      (< 1.0 = la stat DIMINUE au fil du palier, ex. taille Creeper)
#    tier-multiplier — multiplicateur appliqué à la base à chaque nouveau palier
#                      (optionnel, défaut : 2.0)
#    exponent        — courbure dans le palier : 1.0 = linéaire, 3.0 = cubique
#                      (optionnel, défaut : 3.0)
#
#  VALEURS CLÉS AVEC LES DÉFAUTS (tm=2.0, exp=3.0, T=10) :
#    peak-ratio  L1=base  L10=base×peak  L11=base×2  L20=base×2×peak  L30=base×4×peak
#      5.0       ×1       ×5             ×2          ×10              ×20
#      3.0       ×1       ×3             ×2          ×6               ×12
#
#  STATS SPÉCIALES (hors section "stats")
#    explosion-radius — rayon d'explosion du Creeper  (formule linéaire : base + (L-1)×per-level)
#    fuse-ticks       — durée de mèche du Creeper en ticks
#    potion-effects   — effets appliqués à l'attaque
#
#  TIRAGE DU NIVEAU À L'APPARITION
#  ────────────────────────────────
#  Formule du poids pour l'offset i (0 = niveau le plus bas du palier) :
#       weight(i) = (levelsPerTier - i) ^ spawn-weight-exponent
#  Plus l'exposant est grand, plus les élites hauts niveaux sont rares.
#  Valeur recommandée : 1.5 – 2.5
# ══════════════════════════════════════════════════════════════════════════════

