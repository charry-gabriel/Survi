        min-mob-level: 1          # actif dès le niveau 1
        duration-base: 40         # 2 secondes au niveau 1
        duration-per-level: 4.0   # +4 ticks/niveau → level 100 = 436 ticks (≈21 s)
        amplifier-upgrade-every: 20  # niveau I → II à lvl 21, II → III à lvl 41…
        chance-base: 0.10         # 10% au niveau 1
        chance-per-level: 0.005   # +0.5%/niveau → level 100 = 60%
        max-chance: 0.75

      - type: WITHER               # seulement à partir du niveau 30
        min-mob-level: 30
        duration-base: 20          # 1 seconde
        duration-per-level: 3.0
        amplifier-upgrade-every: 30
        chance-base: 0.05
        chance-per-level: 0.004
        max-chance: 0.50

