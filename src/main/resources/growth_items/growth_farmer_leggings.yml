# yaml-language-server: $schema=../schema/growth-items-schema.json
id: GROWTH_FARMER_LEGGINGS
eventType: CropBreakEvent

# Stats de base : speed+, défense- et vie- actives tant que la houe est tenue en main.


tiers:
  - requiredUses: 2000
    effects:
