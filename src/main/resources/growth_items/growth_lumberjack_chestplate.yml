# yaml-language-server: $schema=../schema/growth-items-schema.json
id: GROWTH_LUMBERJACK_CHESTPLATE
eventType: LogBreakEvent

# Stats de base appliquées à la création ET réappliquées à chaque reload (avant les paliers).
# Modifier ces valeurs ici suffit — plus besoin de recompiler ECustomItem.

# Paliers : auto-replant débloqué au palier II, tree feller au palier V.
# Le NOMBRE de bûches supplémentaires cassées par tree feller reste piloté par
# jobs/lumberjack.yml (tree-feller-extra-logs, indexé par niveau de job) — l'item débloque
# la capacité, le métier en augmente la portée.

tiers:
  - requiredUses: 100
    effects:
      - { type: name,           value: "Plastron de Bûcheron II" }
      - { type: set_attribute,  attribute: mining_efficiency, attributeValue: 0.1, operation: ADD_NUMBER, slot: CHEST }
      - { type: unlock_ability, value: auto_replant }
      - { type: message,        value: "Ton plastron grandit, il replante la pousse sous chaque bûche coupée !" }

  - requiredUses: 500
    effects:
      - { type: name,          value: "Plastron de Bûcheron III" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 0.2, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "Tes coupes sont de plus en plus nettes." }

  - requiredUses: 1000
    effects:
      - { type: name,          value: "Plastron de Bûcheron IV" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 0.3, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "La forêt commence à te craindre." }

  - requiredUses: 2500
    effects:
      - { type: name,           value: "Plastron de Bûcheron V" }
      - { type: set_attribute,  attribute: mining_efficiency, attributeValue: 0.4, operation: ADD_NUMBER, slot: CHEST }
      - { type: unlock_ability, value: tree_feller }
      - { type: message,        value: "Tree feller débloqué : une bûche coupée fait tomber tout l'arbre !" }

  - requiredUses: 5000
    effects:
      - { type: name,          value: "Plastron de Bûcheron VI" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 0.5, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "Le bois n'a plus aucun secret pour toi." }

  - requiredUses: 10000
    effects:
      - { type: name,          value: "Plastron de Bûcheron VII" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 0.6, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "Chaque coup de hache abat un peu plus vite." }

  - requiredUses: 20000
    effects:
      - { type: name,          value: "Plastron de Bûcheron VIII" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 0.7, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "Les arbres tombent presque d'eux-mêmes." }

  - requiredUses: 50000
    effects:
      - { type: name,          value: "Plastron de Bûcheron IX" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 0.8, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "Plus aucune forêt ne te résiste." }

  - requiredUses: 100000
    effects:
      - { type: name,          value: "Plastron du Maître Bûcheron" }
      - { type: set_attribute, attribute: mining_efficiency, attributeValue: 1.0, operation: ADD_NUMBER, slot: CHEST }
      - { type: message,       value: "Plastron de légende. Les arbres tremblent à ton approche." }

periodicEffects:
  - everyUses: 300
    effects:
      - { type: potion, effect: haste, seconds: 300 }
      - { type: potion, effect: speed, seconds: 300 }
      - { type: potion, effect: saturation, seconds: 30 }
      - { type: message, value: "Tes bras et tes jambes sont infatigables !" }
