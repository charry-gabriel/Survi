# yaml-language-server: $schema=../schema/growth-items-schema.json
id: GROWTH_FISHERMAN_LEGGINGS
eventType: FishCatchEvent

# Le pantalon débloque le kit aquatique (vitesse de nage, respiration, minage sous l'eau) dès le
# palier II — voir FishermanAttributeService. La MAGNITUDE de chaque bonus reste pilotée par
# jobs/fisherman.yml (underwater-speed-modifier / oxygen-bonus / submerged-mining-speed-modifier,
# indexés par niveau de job) : l'item débloque la capacité, le métier en augmente la portée.

tiers:
  - requiredUses: 100
    effects:
      - { type: name,           value: "Pantalon du Pêcheur II" }
      - { type: set_attribute,  attribute: luck, attributeValue: 1.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: unlock_ability, value: underwater_kit }
      - { type: message,        value: "Ton pantalon grandit, tu nages plus vite, respires plus longtemps et mines mieux sous l'eau !" }

  - requiredUses: 500
    effects:
      - { type: name,          value: "Pantalon du Pêcheur III" }
      - { type: set_attribute, attribute: luck, attributeValue: 3.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "Les poissons te sourient un peu plus." }

  - requiredUses: 1000
    effects:
      - { type: name,          value: "Pantalon du Pêcheur IV" }
      - { type: set_attribute, attribute: luck, attributeValue: 5.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "Tu sens les bancs de poissons avant même de lancer ta ligne." }

  - requiredUses: 2000
    effects:
      - { type: name,          value: "Pantalon du Pêcheur V" }
      - { type: set_attribute, attribute: luck, attributeValue: 10.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "L'océan n'a plus de secret pour toi." }

  - requiredUses: 3000
    effects:
      - { type: name,          value: "Pantalon du Pêcheur VI" }
      - { type: set_attribute, attribute: luck, attributeValue: 15.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "L'océan n'a plus de secret pour toi." }

  - requiredUses: 7000
    effects:
      - { type: name,          value: "Pantalon du Pêcheur VII" }
      - { type: set_attribute, attribute: luck, attributeValue: 20.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "L'océan n'a plus de secret pour toi." }

  - requiredUses: 8000
    effects:
      - { type: name,          value: "Pantalon du Pêcheur VIII" }
      - { type: set_attribute, attribute: luck, attributeValue: 25.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "L'océan n'a plus de secret pour toi." }

  - requiredUses: 9000
    effects:
      - { type: name,          value: "Pantalon du Pêcheur IX" }
      - { type: set_attribute, attribute: luck, attributeValue: 30.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "L'océan n'a plus de secret pour toi." }

  - requiredUses: 10000
    effects:
      - { type: name,          value: "Pantalon du Maître Pêcheur" }
      - { type: set_attribute, attribute: luck, attributeValue: 35.0, operation: ADD_NUMBER, slot: LEGS }
      - { type: message,       value: "Pantalon de légende. Les profondeurs t'appartiennent." }

periodicEffects:
  - everyUses: 10
    effects:
      - { type: potion, effect: speed, seconds: 30 }
      - { type: potion, effect: regeneration, seconds: 30 }
      - { type: potion, effect: dolphins_grace, seconds: 300 }
      - { type: message, value: "Un coup de canne et ça repart !" }
