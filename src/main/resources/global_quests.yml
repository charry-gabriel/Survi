    description: "Éliminez {value} Wither Squelettes du Nether !"
    type: "KILL"
    targets: [WITHER_SKELETON]
    goal: 80
    time_limit: 5400
    rewards:
      - {type: REPUTATION, job: FISHERMAN, value: 80}
      - {type: REPUTATION, job: EXPLORER, value: 50}
      - {type: REPUTATION, job: ENCHANTER, value: 30}
      - {type: POTION, potion: fire_resistance, duration: 1728000, amplifier: 0}
      - {type: POTION, potion: strength, duration: 1728000, amplifier: 1}

  - id: "global_kill_blaze"
