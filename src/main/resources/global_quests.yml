# yaml-language-server: $schema=./schema/global-quests-schema.json
global_quests:

  # ─── Combat ───────────────────────────────────────────────────────────────

  - id: "global_cut_wood"
    name: "Coupons du bois !"
    description: "Coupez {value} bûche d'oak ou de jungle !"
    type: "MINE"
    targets: [OAK_LOG, JUNGLE_LOG]
    goal: 1000
    time_limit: 7200
    rewards:
      - {type: REPUTATION, job: LUMBERJACK, value: 1}
      - {type: POTION, potion: saturation, duration: 300, amplifier: 1}
      - { type: ITEM, item: BREAD, amount: 16}
      - { type: ITEM, item: JUNGLE_WOOD, amount: 16 }
      - { type: ITEM, item: OAK_WOOD, amount: 16 }

  - id: "global_kill_enderman"
    name: "Grande Chasse aux Endermen"
    description: "Ensemble, tuez {value} Endermen dans l'End !"
    type: "KILL"
    targets: [ENDERMAN]
    goal: 200
    time_limit: 3600
    rewards:
      - {type: REPUTATION, job: ENCHANTER, value: 60}
      - {type: REPUTATION, job: FARMER, value: 60}
      - {type: POTION, potion: strength, duration: 1728000, amplifier: 1}
      - {type: POTION, potion: resistance, duration: 1728000, amplifier: 0}

  - id: "global_kill_wither_skeleton"
