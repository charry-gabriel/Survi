# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration du Mineur (MINER)
# ═══════════════════════════════════════════════════════════════════════════════
# Tableau de 11 entrées (index = niveau 0 à 10).

# ─── Multiplicateur de drops ──────────────────────────────────────────────────
# Appliqué aux minerais (coal_ore, iron_ore, gold_ore, diamond_ore…) cassés par le Mineur.
drop-multiplier:
  - 0.20   # niveau  0
  - 0.50   # niveau  1
  - 0.80   # niveau  2
  - 1.00   # niveau  3  — vanilla
  - 1.10   # niveau  4
  - 1.20   # niveau  5
  - 1.30   # niveau  6
  - 1.40   # niveau  7
  - 1.50   # niveau  8
  - 1.75   # niveau  9
  - 2.00   # niveau 10

# ─── Seuil Y de l'effet NIGHT_VISION ──────────────────────────────────────────
# Au-dessus de Y=63 (extérieur), jamais de night vision : règle fixe, non configurable.
# En dessous de Y=63 et jusqu'à ce seuil (inclus), l'effet NIGHT_VISION est appliqué.
# -1 = illimité (night vision jusqu'au bedrock, tant qu'on n'est pas en zone DARKNESS).
cave-night-vision-threshold-y:
  - 60     # niveau  0  — dès l'entrée d'une grotte standard
  - 50     # niveau  1
  - 40     # niveau  2
  - 28     # niveau  3
  - 16     # niveau  4
  - 0      # niveau  5
  - -16    # niveau  6
  - -28    # niveau  7
  - -40    # niveau  8
  - -55    # niveau  9
  - -1     # niveau 10  — illimité

# ─── Seuil Y de l'effet DARKNESS ─────────────────────────────────────────────
# En dessous de ce Y, l'effet DARKNESS est appliqué (sans icône ni minuteur).
# -1 = immunisé (aucun effet, quel que soit le Y).
cave-darkness-threshold-y:
  - 40     # niveau  0
  - 20     # niveau  1
  - 0     # niveau  2
  - -10      # niveau  3
  - -30    # niveau  4
  - -40    # niveau  5
  - -50    # niveau  6
  - -1    # niveau  7
  - -1     # niveau  8
  - -1     # niveau  9
  - -1     # niveau 10

# ─── Seuil Y de l'effet DARKNESS au Nether ───────────────────────────────────
# Spécifique au Nether (le monde NORMAL utilise cave-darkness-threshold-y ci-dessus).
# Aucune night vision n'est jamais appliquée au Nether, quel que soit le niveau ou le Y.
# En dessous de ce Y, l'effet DARKNESS est appliqué. -1 = immunisé (aucun effet).
# Valeur 25 ⇒ déclenche à Y=24 et en dessous.
nether-darkness-threshold-y:
  - 25     # niveau  0
  - 25     # niveau  1
  - 25     # niveau  2
  - 25     # niveau  3
  - 25     # niveau  4
  - 25     # niveau  5
  - 25     # niveau  6
  - 25     # niveau  7
  - 25     # niveau  8
  - -1     # niveau  9  — immunisé
  - -1     # niveau 10  — immunisé

# ─── Hystérésis (anti-clignotement) ──────────────────────────────────────────
# Marges appliquées uniquement à la SORTIE de zone (l'entrée reste sur le seuil exact),
# pour éviter les changements répétés quand le joueur oscille pile sur une limite.
cave-darkness-hysteresis: 3        # blocs Y — DARKNESS (grotte ET Nether)
cave-night-vision-hysteresis: 3    # blocs Y — NIGHT_VISION
cave-light-hysteresis: 2           # niveau de lumière du ciel (0-15) — détection "grotte" (skylight)

# ─── Vein miner — minerais supplémentaires (BFS sur le filon connecté) ───────
# Débloqué par l'ability "vein_miner" du casque (growth_items/growth_miner_helmet.yml, palier V).
# Ce tableau pilote uniquement le NOMBRE de minerais en plus du bloc cassé : l'item débloque
# la capacité, le niveau de job en augmente la portée (même logique que tree-feller-extra-logs
# pour le Bûcheron). 0 = vein miner inactif à ce niveau même ability débloquée.
vein-miner-extra-ores:
  - 0      # niveau  0
  - 0      # niveau  1
  - 0      # niveau  2
  - 0      # niveau  3
  - 0      # niveau  4
  - 1      # niveau  5
  - 2      # niveau  6
  - 3      # niveau  7
  - 4      # niveau  8
  - 5      # niveau  9
  - 6      # niveau 10