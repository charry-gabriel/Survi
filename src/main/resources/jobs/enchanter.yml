# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration de l'Enchanteur (ENCHANTER)
# ═══════════════════════════════════════════════════════════════════════════════
# Tableaux de 11 entrées (index = niveau 0 à 10). Valeur -1 = illimité / aucun effet.

# Multiplicateur de dégâts de durabilité (0.0 = aucun dommage, 1.0 = vanilla, >1.0 = plus de dommages)
durability-loss-multiplier:
  - 2.00   # niveau  0
  - 1.50   # niveau  1
  - 1.25   # niveau  2
  - 1.00   # niveau  3  — vanilla
  - 0.75   # niveau  4
  - 0.50   # niveau  5
  - 0.25   # niveau  6
  - 0.10   # niveau  7
  - 0.10   # niveau  8
  - 0.10   # niveau  9
  - 0.10   # niveau 10

# Coût XP maximum autorisé pour une opération d'enclume (-1 = illimité)
anvil-max-xp-cost:
  - 2    # niveau  0
  - 4    # niveau  1
  - 7    # niveau  2
  - 11   # niveau  3
  - 16   # niveau  4
  - 20   # niveau  5
  - 25   # niveau  6
  - 30   # niveau  7
  - 35   # niveau  8
  - 40   # niveau  9
  - -1   # niveau 10  — illimité

# Coût XP maximum autorisé pour la table d'enchantement (-1 = illimité)
enchant-max-xp-cost:
  - 0    # niveau  0  — bloqué (jobLevel == 0)
  - 3    # niveau  1
  - 6    # niveau  2
  - 10    # niveau  3
  - 14   # niveau  4
  - 18   # niveau  5
  - 22   # niveau  6
  - 26   # niveau  7
  - -1   # niveau  8
  - -1   # niveau  9
  - -1   # niveau 10  — illimité

# Niveau d'enchantement maximum autorisé (table d'enchantement et enclume). -1 = illimité.
enchant-max-level:
  - 0    # niveau  0  — bloqué (jobLevel == 0)
  - 1    # niveau  1
  - 2    # niveau  2
  - 3    # niveau  3
  - 4    # niveau  4
  - 5    # niveau  5
  - 6    # niveau  6
  - 7    # niveau  7
  - 8    # niveau  8
  - 9    # niveau  9
  - -1   # niveau 10  — illimité

# Somme maximale des niveaux de tous les enchantements présents sur l'item résultant d'une opération d'enclume.
# Exemple : Sharp5 + Unbreaking3 + Fire Aspect2 = 5+3+2 = 10. -1 = illimité.
anvil-max-enchant-sum:
  - 0    # niveau  0
  - 3    # niveau  1
  - 6    # niveau  2
  - 10    # niveau  3
  - 14    # niveau  4
  - 18    # niveau  5
  - 22    # niveau  6
  - 26   # niveau  7
  - 28   # niveau  8
  - 30   # niveau  9
  - -1   # niveau 10  — illimité

# Durabilité réparée par point d'XP gagné (0 = réparation désactivée à ce niveau)
repair-per-xp:
  - 0   # niveau  0
  - 0   # niveau  1
  - 0   # niveau  2
  - 0   # niveau  3
  - 0   # niveau  4
  - 0   # niveau  5
  - 0   # niveau  6
  - 0   # niveau  7
  - 0   # niveau  8
  - 2   # niveau  9
  - 4   # niveau 10