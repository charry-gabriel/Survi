  - 2.2    # niveau  2
  - 2.7    # niveau  3
  - 3.2    # niveau  4
  - 3.7    # niveau  5
  - 4.2    # niveau  6
  - 4.7    # niveau  7
  - 5.2    # niveau  8
  - 5.7    # niveau  9
  - 6.2    # niveau 10