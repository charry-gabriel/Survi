# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration du Pêcheur (FISHERMAN)
# ═══════════════════════════════════════════════════════════════════════════════
# Tableaux de 11 entrées (index = niveau 0 à 10).

# Fenêtre d'attente vanilla de la canne à pêche (en ticks)
vanilla-min-wait-ticks: 100
vanilla-max-wait-ticks: 600

# Multiplicateur appliqué aux temps d'attente vanilla (<1.0 = plus rapide, >1.0 = plus lent)
fishing-wait-multiplier:
  - 2.00   # niveau  0  — 2× plus long
  - 1.75   # niveau  1
  - 1.50   # niveau  2
  - 1.25   # niveau  3
  - 1.10   # niveau  4
  - 1.00   # niveau  5  — vanilla
  - 0.85   # niveau  6
  - 0.70   # niveau  7
  - 0.55   # niveau  8
  - 0.40   # niveau  9
  - 0.25   # niveau 10  — 4× plus rapide

# Multiplicateur de loot appliqué aux items pêchés
loot-multiplier:
  - 0.20   # niveau  0
  - 0.50   # niveau  1
  - 0.80   # niveau  2
  - 1.00   # niveau  3  — vanilla
  - 1.10   # niveau  4
  - 1.20   # niveau  5
  - 1.30   # niveau  6
  - 1.40   # niveau  7
  - 1.50   # niveau  8
  - 1.75   # niveau  9
  - 2.00   # niveau 10

# ─── Malus global ─────────────────────────────────────────────────────────────

# Probabilité de remplacer l'item pêché par un matériau tiré de dirt-replacement-materials
dirt-chance:
  - 0.70   # niveau  0
  - 0.56   # niveau  1
  - 0.43   # niveau  2
  - 0.30   # niveau  3
  - 0.18   # niveau  4
  - 0.08   # niveau  5
  - 0.02   # niveau  6
  - 0.00   # niveau  7
  - 0.00   # niveau  8
  - 0.00   # niveau  9
  - 0.00   # niveau 10

dirt-replacement-materials:
  - DIRT

# ─── Malus trésors ────────────────────────────────────────────────────────────

treasure-penalty:
  - 0.92   # niveau  0
  - 0.78   # niveau  1
  - 0.62   # niveau  2
  - 0.44   # niveau  3
  - 0.24   # niveau  4
  - 0.08   # niveau  5
  - 0.00   # niveau  6
  - 0.00   # niveau  7
  - 0.00   # niveau  8
  - 0.00   # niveau  9
  - 0.00   # niveau 10

treasure-replacement-materials:
  - DIRT

# ─── Pression sous-marine ─────────────────────────────────────────────────────

# Profondeur maximale sûre (blocs d'eau au-dessus du joueur) avant dégâts de pression.
# -1 = aucun dégât. Valeurs très négatives = dégâts permanents dès que le joueur touche l'eau.
pressure-safe-depth:
  - -500   # niveau  0  — tout contact avec l'eau cause des dégâts
  - 0      # niveau  1
  - 2      # niveau  2
  - 5      # niveau  3
  - 10     # niveau  4
  - 20     # niveau  5
  - 50     # niveau  6
  - 80     # niveau  7
  - -1    # niveau  8
  - -1    # niveau  9
  - -1     # niveau 10  — aucun dégât de pression

pressure-damage: 1.0

# ─── Attributs aquatiques ─────────────────────────────────────────────────────

# Modificateur ADD_NUMBER sur WATER_MOVEMENT_EFFICIENCY (vitesse de nage).
# Valeur 0.0 = vitesse vanilla. Active à partir du niveau 3.
underwater-speed-modifier:
  - 0.010   # niveau  0
  - 0.050   # niveau  1
  - 0.100   # niveau  2
  - 0.200   # niveau  3
  - 0.400   # niveau  4
  - 0.600   # niveau  5
  - 0.800   # niveau  6
  - 1.000   # niveau  7
  - 1.100   # niveau  8
  - 1.300   # niveau  9
  - 1.500   # niveau 10

# Modificateur ADD_NUMBER sur OXYGEN_BONUS (valeur sans unité).
# L'attribut fonctionne en probabilité : chaque tick sous l'eau, le joueur a 1/(1+bonus) chance
# de perdre 1 air. La durée totale est donc 300 × (1 + bonus) ticks.
# Formule inverse : bonus = durée_cible_ticks / 300 − 1.
oxygen-bonus:
  - 0.000  # niveau  0  — 300 ticks = 15 s (vanilla)
  - 0.200  # niveau  1  — 360 ticks = 18 s
  - 0.400  # niveau  2  — 420 ticks = 21 s
  - 0.667  # niveau  3  — 500 ticks = 25 s
  - 1.000  # niveau  4  — 600 ticks = 30 s
  - 1.600  # niveau  5  — 780 ticks = 39 s
  - 2.400  # niveau  6  — 1020 ticks = 51 s
  - 4.000  # niveau  7  — 1500 ticks = 1 m 15 s
  - 8.000  # niveau  8  — 2700 ticks = 2 m 15 s
  - 14.000 # niveau  9  — 4500 ticks = 3 m 45 s
  - 24.000 # niveau 10  — 7500 ticks ≈ 6 m 15 s

# Modificateur ADD_NUMBER sur SUBMERGED_MINING_SPEED (vitesse de minage sous l'eau).
# Remplace l'ancien effet de potion HASTE. Valeur 0.0 = vitesse vanilla (pénalité normale).
# Active à partir du niveau 5.
submerged-mining-speed-modifier:
  - 0.010   # niveau  0
  - 0.100   # niveau  1
  - 0.150   # niveau  2
  - 0.200   # niveau  3
  - 0.250   # niveau  4
  - 0.300   # niveau  5
  - 0.400   # niveau  6
  - 0.500   # niveau  7
  - 0.600   # niveau  8
  - 0.800   # niveau  9
  - 1.000   # niveau 10

# ─── Pluie acide ──────────────────────────────────────────────────────────────

# Dégâts infligés par tick d'exposition à la pluie acide (en demi-cœurs).
acid-rain-damage: 1

# Niveau Pêcheur minimum pour être immunisé à la pluie acide.
acid-rain-fisherman-level-threshold: 3

# ─── Loot alchimique ──────────────────────────────────────────────────────────

# Probabilité DE BASE qu'une pêche non-trésor donne un item alchimique (par niveau).
# La luck vient AMPLIFIER cette base via alchemic-luck-scale — formule multiplicative :
#   chance = min(1, base[level] × (1 + alchemic-luck-scale × vanillaLuck))
#
# Conséquence clé : au niveau 0 (base=0.00), les potions sont à 0 % quelle que soit
# la luck du pantalon. La luck ne sert qu'à amplifier ce que le niveau a déjà ouvert.
#
# Exemples niveau 10 (base = 0.10) :
#   luck=0 (sans pantalon)      : 0.10 × (1+0.0) = 10 % de non-trésors → ~9.5 % total
#   luck=3 (Pantalon V)         : 0.10 × (1+2.4) = 34 % de non-trésors → ~26 % total
#   luck=7 (Maître Pêcheur X)   : 0.10 × (1+5.6) = 66 % de non-trésors → ~40 % total
alchemic-catch-chance:
  - 0.00   # niveau  0  — jamais (base nulle → luck sans effet)
  - 0.01   # niveau  1
  - 0.02   # niveau  2
  - 0.03   # niveau  3
  - 0.04   # niveau  4
  - 0.05   # niveau  5
  - 0.06   # niveau  6
  - 0.07   # niveau  7
  - 0.08   # niveau  8
  - 0.09   # niveau  9
  - 0.10   # niveau 10

# Facteur multiplicatif par point de luck (voir formule ci-dessus).
# chance effective = base[level] × alchemic-luck-scale × vanillaLuck
# À luck=7 (Maître) : 0.10 × 0.94 × 7 = 0.658 → ~65 % de non-trésors → ~40 % total.
alchemic-luck-scale: 0.94

# Bonus de poids ajouté à chaque entrée alchimique éligible selon une formule
# QUADRATIQUE : bonus = round(luck² × alchemic-luck-weight-bonus).
# Convergence lente au début, progressive en fin de progression :
#   luck=0.5 (Pan.II)  : bonus=2  → Nether Wart / DEFLAGRATION = 33.5:1
#   luck=1.0 (Pan.III) : bonus=8  →                              22.7:1
#   luck=3.0 (Pan.V)   : bonus=72 →                               5.8:1
#   luck=7.0 (Maître)  : bonus=392→                               2.0:1
alchemic-luck-weight-bonus: 8

