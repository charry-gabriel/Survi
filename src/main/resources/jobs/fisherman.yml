# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration du Pêcheur (FISHERMAN)
# ═══════════════════════════════════════════════════════════════════════════════
# Tableaux de 11 entrées (index = niveau 0 à 10).

# Fenêtre d'attente vanilla de la canne à pêche (en ticks)
vanilla-min-wait-ticks: 100
vanilla-max-wait-ticks: 600

# Multiplicateur appliqué aux temps d'attente vanilla (<1.0 = plus rapide, >1.0 = plus lent)
fishing-wait-multiplier:
  - 2.00   # niveau  0  — 2× plus long
  - 1.75   # niveau  1
  - 1.50   # niveau  2
  - 1.25   # niveau  3
  - 1.10   # niveau  4
  - 1.00   # niveau  5  — vanilla
  - 0.85   # niveau  6
  - 0.70   # niveau  7
  - 0.55   # niveau  8
  - 0.40   # niveau  9
  - 0.25   # niveau 10  — 4× plus rapide

# Multiplicateur de loot appliqué aux items pêchés
loot-multiplier:
  - 0.20   # niveau  0
  - 0.50   # niveau  1
  - 0.80   # niveau  2
  - 1.00   # niveau  3  — vanilla
  - 1.10   # niveau  4
  - 1.20   # niveau  5
  - 1.30   # niveau  6
  - 1.40   # niveau  7
  - 1.50   # niveau  8
  - 1.75   # niveau  9
  - 2.00   # niveau 10

# ─── Malus global ─────────────────────────────────────────────────────────────

# Probabilité de remplacer l'item pêché par un matériau tiré de dirt-replacement-materials
dirt-chance:
  - 0.70   # niveau  0
  - 0.56   # niveau  1
  - 0.43   # niveau  2
  - 0.30   # niveau  3
  - 0.18   # niveau  4
  - 0.08   # niveau  5
  - 0.02   # niveau  6
  - 0.00   # niveau  7
  - 0.00   # niveau  8
  - 0.00   # niveau  9
  - 0.00   # niveau 10

dirt-replacement-materials:
  - DIRT

# ─── Malus trésors ────────────────────────────────────────────────────────────

treasure-penalty:
  - 0.92   # niveau  0
  - 0.78   # niveau  1
  - 0.62   # niveau  2
  - 0.44   # niveau  3
  - 0.24   # niveau  4
  - 0.08   # niveau  5
  - 0.00   # niveau  6
  - 0.00   # niveau  7
  - 0.00   # niveau  8
  - 0.00   # niveau  9
  - 0.00   # niveau 10

treasure-replacement-materials:
  - DIRT

# ─── Pression sous-marine ─────────────────────────────────────────────────────

# Profondeur maximale sûre (blocs d'eau au-dessus du joueur) avant dégâts de pression.
# -1 = aucun dégât. Valeurs très négatives = dégâts permanents dès que le joueur touche l'eau.
pressure-safe-depth:
  - -500   # niveau  0  — tout contact avec l'eau cause des dégâts
  - 0      # niveau  1
  - 2      # niveau  2
  - 5      # niveau  3
  - 10     # niveau  4
  - 20     # niveau  5
  - 50     # niveau  6
  - 80     # niveau  7
  - -1    # niveau  8
  - -1    # niveau  9
  - -1     # niveau 10  — aucun dégât de pression

pressure-damage: 1.0

# ─── Attributs aquatiques ─────────────────────────────────────────────────────

# Modificateur ADD_NUMBER sur WATER_MOVEMENT_EFFICIENCY (vitesse de nage).
# Valeur 0.0 = vitesse vanilla. Active à partir du niveau 3.
underwater-speed-modifier:
  - 0.010   # niveau  0
  - 0.050   # niveau  1
  - 0.100   # niveau  2
  - 0.200   # niveau  3
  - 0.400   # niveau  4
  - 0.600   # niveau  5
  - 0.800   # niveau  6
  - 1.000   # niveau  7
  - 1.100   # niveau  8
  - 1.300   # niveau  9
  - 1.500   # niveau 10

# Modificateur ADD_NUMBER sur OXYGEN_BONUS (valeur sans unité).
# L'attribut fonctionne en probabilité : chaque tick sous l'eau, le joueur a 1/(1+bonus) chance
# de perdre 1 air. La durée totale est donc 300 × (1 + bonus) ticks.
# Formule inverse : bonus = durée_cible_ticks / 300 − 1.
oxygen-bonus:
  - 0.000  # niveau  0  — 300 ticks = 15 s (vanilla)
  - 0.200  # niveau  1  — 360 ticks = 18 s
  - 0.400  # niveau  2  — 420 ticks = 21 s
  - 0.667  # niveau  3  — 500 ticks = 25 s
  - 1.000  # niveau  4  — 600 ticks = 30 s
  - 1.600  # niveau  5  — 780 ticks = 39 s
  - 2.400  # niveau  6  — 1020 ticks = 51 s
  - 4.000  # niveau  7  — 1500 ticks = 1 m 15 s
  - 8.000  # niveau  8  — 2700 ticks = 2 m 15 s
  - 14.000 # niveau  9  — 4500 ticks = 3 m 45 s
  - 24.000 # niveau 10  — 7500 ticks ≈ 6 m 15 s

# Modificateur ADD_NUMBER sur SUBMERGED_MINING_SPEED (vitesse de minage sous l'eau).
# Remplace l'ancien effet de potion HASTE. Valeur 0.0 = vitesse vanilla (pénalité normale).
# Active à partir du niveau 5.
submerged-mining-speed-modifier:
  - 0.010   # niveau  0
  - 0.100   # niveau  1
  - 0.150   # niveau  2
  - 0.200   # niveau  3
  - 0.250   # niveau  4
  - 0.300   # niveau  5
  - 0.350   # niveau  6
  - 0.400   # niveau  7
  - 0.500   # niveau  8
  - 0.600   # niveau  9
  - 0.800   # niveau 10

# ─── Pluie acide ──────────────────────────────────────────────────────────────

# Dégâts infligés par tick d'exposition à la pluie acide (en demi-cœurs).
acid-rain-damage: 1

# Niveau Pêcheur minimum pour être immunisé à la pluie acide.
acid-rain-fisherman-level-threshold: 6

# ─── Loot alchimique ──────────────────────────────────────────────────────────
# Probabilité qu'une pêche soit alchimique (remplace le drop normal)
# Progression avec le niveau : 0% au niveau 0, 60% au niveau 10
alchemic-catch-chance:
  - 0.00   # niveau  0  — jamais
  - 0.03   # niveau  1
  - 0.06   # niveau  2
  - 0.10   # niveau  3
  - 0.15   # niveau  4
  - 0.22   # niveau  5
  - 0.30   # niveau  6
  - 0.38   # niveau  7
  - 0.45   # niveau  8
  - 0.52   # niveau  9
  - 0.60   # niveau 10

# Table de loot alchimique
# Les poids (weight) définissent la fréquence relative dans un tirage au sort.
# Tier 1 ingrédient > Tier 1 vanilla > Tier 2 vanilla > Potions inédites
#
# type: ingredient | vanilla_potion | custom_potion
# level-min: niveau Pêcheur minimum pour que l'entrée soit éligible
# weight: poids dans le tirage pondéré parmi les entrées éligibles
alchemic-loot:

  # ── Ingrédient — Nether Wart (seul ingrédient pêchable) ─────────────────────
  - type: ingredient
    item: NETHER_WART
    level-min: 1
    weight: 200

  # ── Potions vanilla Tier 1 ───────────────────────────────────────────────────
  # Régénération I — durée réduite (30 s, vanilla = 45 s)
  - type: vanilla_potion
    effect: REGENERATION
    duration: 600
    amplifier: 0
    splash: false
    level-min: 3
    weight: 70

  # Soin instantané I
  - type: vanilla_potion
    effect: INSTANT_HEALTH
    duration: 1
    amplifier: 0
    splash: false
    level-min: 3
    weight: 65

  # Force I — amplifier 0 seulement (Force II bloquée)
  - type: vanilla_potion
    effect: STRENGTH
    duration: 1800
    amplifier: 0
    splash: false
    level-min: 4
    weight: 50

  # ── Potions vanilla Tier 2 (moins communes) ───────────────────────────────────
  # Régénération II — durée très courte (15 s, car amplifier 1 très puissant)
  - type: vanilla_potion
    effect: REGENERATION
    duration: 300
    amplifier: 1
    splash: false
    level-min: 5
    weight: 28

  # Soin instantané II
  - type: vanilla_potion
    effect: INSTANT_HEALTH
    duration: 1
    amplifier: 1
    splash: false
    level-min: 5
    weight: 25

  # ── Potions inédites (rares, niveau haut requis) ─────────────────────────────
  # Bouclier Éphémère — absorbe 3 coups
  - type: custom_potion
    id: BOUCLIER
    level-min: 5
    weight: 15

  # Miasme — nuage Poison III au sol (splash)
  - type: custom_potion
    id: MIASME
    level-min: 5
    weight: 13

  # Déflagration — gros dégâts AOE autour du point d'impact (splash)
  - type: custom_potion
    id: DEFLAGRATION
    level-min: 6
    weight: 10

  # Symbiose — régénération mais 0 dégâts en attaque
  - type: custom_potion
    id: SYMBIOSE
    level-min: 7
    weight: 7

  # Fissure — Haste XV / 8 s puis Fatigue IV / 2 min
  - type: custom_potion
    id: FISSURE
    level-min: 8
    weight: 4
