# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration du Pêcheur (FISHERMAN)
# ═══════════════════════════════════════════════════════════════════════════════
# Tableaux de 11 entrées (index = niveau 0 à 10).

# Fenêtre d'attente vanilla de la canne à pêche (en ticks)
vanilla-min-wait-ticks: 100
vanilla-max-wait-ticks: 600

# Multiplicateur appliqué aux temps d'attente vanilla (<1.0 = plus rapide, >1.0 = plus lent)
fishing-wait-multiplier:
  - 2.00   # niveau  0  — 2× plus long
  - 1.75   # niveau  1
  - 1.50   # niveau  2
  - 1.25   # niveau  3
  - 1.10   # niveau  4
  - 1.00   # niveau  5  — vanilla
  - 0.85   # niveau  6
  - 0.70   # niveau  7
  - 0.55   # niveau  8
  - 0.40   # niveau  9
  - 0.25   # niveau 10  — 4× plus rapide

# Multiplicateur de loot appliqué aux items pêchés
loot-multiplier:
  - 0.20   # niveau  0
  - 0.50   # niveau  1
  - 0.80   # niveau  2
  - 1.00   # niveau  3  — vanilla
  - 1.10   # niveau  4
  - 1.20   # niveau  5
  - 1.30   # niveau  6
  - 1.40   # niveau  7
  - 1.50   # niveau  8
  - 1.75   # niveau  9
  - 2.00   # niveau 10

# ─── Malus global ─────────────────────────────────────────────────────────────

# Probabilité de remplacer l'item pêché par un matériau tiré de dirt-replacement-materials
dirt-chance:
  - 0.70   # niveau  0
  - 0.56   # niveau  1
  - 0.43   # niveau  2
  - 0.30   # niveau  3
  - 0.18   # niveau  4
  - 0.08   # niveau  5
  - 0.02   # niveau  6
  - 0.00   # niveau  7
  - 0.00   # niveau  8
  - 0.00   # niveau  9
  - 0.00   # niveau 10

dirt-replacement-materials:
  - DIRT

# ─── Malus trésors ────────────────────────────────────────────────────────────

treasure-penalty:
  - 0.92   # niveau  0
  - 0.78   # niveau  1
  - 0.62   # niveau  2
  - 0.44   # niveau  3
  - 0.24   # niveau  4
  - 0.08   # niveau  5
  - 0.00   # niveau  6
  - 0.00   # niveau  7
  - 0.00   # niveau  8
  - 0.00   # niveau  9
  - 0.00   # niveau 10

treasure-replacement-materials:
  - DIRT

# ─── Pression sous-marine ─────────────────────────────────────────────────────

# Profondeur maximale sûre (blocs d'eau au-dessus du joueur) avant dégâts de pression.
# -1 = aucun dégât. Valeurs très négatives = dégâts permanents dès que le joueur touche l'eau.
pressure-safe-depth:
  - -500   # niveau  0  — tout contact avec l'eau cause des dégâts
  - 0      # niveau  1
  - 2      # niveau  2
  - 5      # niveau  3
  - 10     # niveau  4
  - 20     # niveau  5
  - 50     # niveau  6
  - 80     # niveau  7
  - 110    # niveau  8
  - 150    # niveau  9
  - -1     # niveau 10  — aucun dégât de pression

pressure-damage: 1.0

# ─── Attributs aquatiques ─────────────────────────────────────────────────────

# Modificateur ADD_NUMBER sur WATER_MOVEMENT_EFFICIENCY (vitesse de nage).
# Valeur 0.0 = vitesse vanilla. Active à partir du niveau 3.
underwater-speed-modifier:
  - 0.000   # niveau  0
  - 0.000   # niveau  1
  - 0.000   # niveau  2
  - 0.010   # niveau  3
  - 0.050   # niveau  4
  - 0.100   # niveau  5
  - 0.200   # niveau  6
  - 0.400   # niveau  7
  - 0.700   # niveau  8
  - 1.000   # niveau  9
  - 1.500   # niveau 10

# Bonus de ticks de respiration (ADD_NUMBER sur OXYGEN_BONUS).
# Réserve d'air de base : 300 ticks (15 s). Valeur 0 = durée vanilla.
oxygen-bonus-ticks:
  - 0      # niveau  0  — 300 ticks = 15 s (vanilla, court)
  - 60     # niveau  1  — 360 ticks = 18 s
  - 120    # niveau  2  — 420 ticks = 21 s
  - 200    # niveau  3  — 500 ticks = 25 s
  - 300    # niveau  4  — 600 ticks = 30 s
  - 480    # niveau  5  — 780 ticks = 39 s
  - 720    # niveau  6  — 1020 ticks = 51 s
  - 1200   # niveau  7  — 1500 ticks = 1 m 15 s
  - 2400   # niveau  8  — 2700 ticks = 2 m 15 s
  - 4200   # niveau  9  — 4500 ticks = 3 m 45 s
  - 7200   # niveau 10  — 7500 ticks ≈ 6 m 15 s

# Modificateur ADD_NUMBER sur SUBMERGED_MINING_SPEED (vitesse de minage sous l'eau).
# Remplace l'ancien effet de potion HASTE. Valeur 0.0 = vitesse vanilla (pénalité normale).
# Active à partir du niveau 5.
submerged-mining-speed-modifier:
  - 0.000   # niveau  0
  - 0.000   # niveau  1
  - 0.000   # niveau  2
  - 0.000   # niveau  3
  - 0.000   # niveau  4
  - 0.100   # niveau  5
  - 0.200   # niveau  6
  - 0.350   # niveau  7
  - 0.500   # niveau  8
  - 0.650   # niveau  9
  - 0.800   # niveau 10

# ─── Pluie acide ──────────────────────────────────────────────────────────────

# Dégâts infligés par tick d'exposition à la pluie acide (en demi-cœurs).
acid-rain-damage: 1

# Niveau Pêcheur minimum pour être immunisé à la pluie acide.
acid-rain-fisherman-level-threshold: 5
