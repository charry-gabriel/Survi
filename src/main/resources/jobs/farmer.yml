# ═══════════════════════════════════════════════════════════════════════════════
#  Survi — Configuration du Fermier (FARMER)
# ═══════════════════════════════════════════════════════════════════════════════
# Tableaux de 11 entrées (index = niveau 0 à 10).

# ─── Multiplicateur de drops ──────────────────────────────────────────────────
# Appliqué aux cultures récoltées et aux mobs passifs tués par le Fermier.
drop-multiplier:
  - 0.20   # niveau  0
  - 0.50   # niveau  1
  - 0.80   # niveau  2
  - 1.00   # niveau  3  — vanilla
  - 1.10   # niveau  4
  - 1.20   # niveau  5
  - 1.30   # niveau  6
  - 1.40   # niveau  7
  - 1.50   # niveau  8
  - 1.75   # niveau  9
  - 2.00   # niveau 10

# Probabilité d'autoriser un tick de croissance (niveaux 0–4 = ralentissement)
crop-growth-allow-chance:
  - 0.05   # niveau  0  — 20× plus lent que vanilla
  - 0.15   # niveau  1
  - 0.30   # niveau  2
  - 0.50   # niveau  3
  - 0.70   # niveau  4
  - 1.00   # niveau  5  — vanilla
  - 1.00   # niveau  6
  - 1.00   # niveau  7
  - 1.00   # niveau  8
  - 1.00   # niveau  9
  - 1.00   # niveau 10

# Probabilité d'un tick de croissance BONUS immédiatement après un tick normal (niveaux 6–10)
crop-extra-growth-chance:
  - 0.00   # niveau  0
  - 0.00   # niveau  1
  - 0.00   # niveau  2
  - 0.00   # niveau  3
  - 0.00   # niveau  4
  - 0.00   # niveau  5
  - 0.20   # niveau  6
  - 0.40   # niveau  7
  - 0.65   # niveau  8
  - 1.00   # niveau  9
  - 1.00   # niveau 10

# Probabilité d'un 3e tick bonus au niveau maximum (s'applique uniquement si crop-extra-growth-chance déclenche)
crop-third-tick-chance-at-max: 0.50

# Probabilité que la farine d'os fonctionne (sinon l'item est rendu au joueur)
bone-meal-chance:
  - 0.01   # niveau  0
  - 0.02   # niveau  1
  - 0.10   # niveau  2
  - 0.20   # niveau  3
  - 0.30   # niveau  4
  - 0.40   # niveau  5
  - 0.50   # niveau  6
  - 0.60   # niveau  7
  - 0.70   # niveau  8
  - 0.80   # niveau  9
  - 1.00   # niveau 10