# ─── Reload all — résultat complet (message unique multi-ligne) ───────────────
cmd.reload.all.done: |-
  <green>✔ Rechargement terminé :
  <gray>  quests/*.yml → <white>{0} quête(s)
  <gray>  global_quests.yml → <white>{1} quête(s) globale(s)
  <gray>  monsters.yml ✔ — roles.yml ✔ (joueurs connectés mis à jour) — growth_items/*.yml ✔
  <gray>  villagers/*.yml + traders/*.yml ✔ (entités en jeu mises à jour, inventaires recalculés)
  <gray>  jobs/*.yml ✔ (drops, multiplicateurs, matériaux de remplacement actifs immédiatement)
  <yellow>  ⚠ recipes.yml et config.yml nécessitent un redémarrage.

