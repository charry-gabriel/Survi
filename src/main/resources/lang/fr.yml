grave.indestructible: "<red>Cette tombe est indestructible !"
grave.created: "<green>☠ Votre tombe a été créée en {0}, {1}, {2} [{3}]"
grave.not_yours: "<red>Ce n'est pas votre tombe !"
grave.recovered: "<green>Vous avez récupéré votre tombe."

# ─── Monde ───────────────────────────────────────────────────────────────────
world.locked: "<red>✖ Ce monde n'est pas encore accessible !"
world.level_up.broadcast: "<gold>✦ Le monde a évolué ! <yellow>Niveau {0} <gray>→ <gold>Niveau {1}"
