# ─── Quête ───────────────────────────────────────────────────────────────────
quest.already_claimed: "<red>Vous avez déjà une quête terminée à réclamer !"
quest.already_active: "<red>Vous avez déjà une quête en cours. Terminez-la d'abord !"
quest.not_available: "<red>Aucune quête n'est encore disponible. Attendez le début de la partie !"
quest.capacity_full: "<red>Vous avez complété {0}/{1} quêtes disponibles. Revenez demain !"
quest.validate_trader_prefix: "<red>Cette quête doit être validée auprès de "
quest.accepted.prefix: "<green>Nouvelle quête acceptée auprès de "
quest.accepted.separator: "<green> : "
quest.accepted.slots: "<dark_gray>Quête {0}/{1} disponibles."
quest.completed.prefix: "<green>Quête terminée : "
quest.completed.go_trader: "<gray>Allez voir le Trader pour obtenir votre récompense !"
quest.rewards_received.prefix: "<green>Vous avez reçu les récompenses de la quête ! "
quest.rewards_received.suffix: "<green> quêtes complétées."
quest.reset_by_admin: "<yellow>Votre quête a été réinitialisée par un administrateur. Vous pouvez en accepter une nouvelle !"
quest.dropped_on_reload: "<yellow>Votre quête en cours a été supprimée suite à une mise à jour. Vous pouvez en accepter une nouvelle auprès d'un Trader."
quest.orphan_rewarded: "<green>Votre quête « {0} » a été récompensée automatiquement suite à une mise à jour."
quest.test.prefix: "<yellow>[TEST] Quête de test assignée : "
quest.test.details: "<dark_gray>Objectif : {0} | Difficulté : {1} | Métiers : {2}"
quest.new_slots.prefix: "<gold>[Quêtes] "
quest.new_slots.body: "<green>{0} nouveau(x) créneau(x) disponible(s) ! <dark_gray>({1}/{2} utilisés)"

# ─── ActionBar quête journalière ─────────────────────────────────────────────
quest.actionbar.quests_suffix: "<dark_gray> quêtes]"
quest.actionbar.finished_prefix: "<bold><green>✔ Quête terminée : "
quest.actionbar.finished_suffix: "<gray> — Allez voir le Trader !"

# ─── BossBar quête globale ───────────────────────────────────────────────────
quest.global.bossbar.content: "<gold>⚔ <white>{0}  <dark_gray>▶  <aqua>{1}/{2}  <gray>({3}%)"
quest.global.bossbar.finished: "<green>✔ <yellow>{0}  <green>—  Complétée !"

# ─── Notifications hors-ligne ─────────────────────────────────────────────────
offline.header: "<dark_gray>─── Pendant votre absence ───"
offline.job_level: "<gold>⚒ Métier <job><gold> : <gray>niv.<old> <gray>→ <yellow>niv.<new>"
offline.world_level: "<gold>✦ Niveau du monde : <yellow>Niveau {0} <gray>→ <gold>Niveau {1}"
