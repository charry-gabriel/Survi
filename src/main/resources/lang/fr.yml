world.level_up.subtitle: "<yellow>Le monde devient plus difficile…"

# ─── Métier ──────────────────────────────────────────────────────────────────
job.level_up.title: "<gold>⚒ Niveau supérieur !"
job.level_up.subtitle_suffix: "<yellow> · niv.{0}"
job.level_up.broadcast: "<gold>⚒ <white><player> <gold>a atteint le niveau <yellow><level> <gold>en <job><gold> !"
