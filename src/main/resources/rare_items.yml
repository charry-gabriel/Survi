# yaml-language-server: $schema=./schema/rare-items-schema.json
# Configuration des items rares de collection liés aux métiers
# Rechargeable à chaud via /survi reload rare_items

# ── Paramètres globaux ───────────────────────────────────────────────────────

# Sauvegarde en DB toutes les N actions (flush périodique)
save-every: 25

# Niveau de métier minimum avant que la chance ne commence à s'activer
min-job-level: 5

# Fenêtre de détection d'activité suspecte en millisecondes (600 000 = 10 minutes)
suspicious-window-ms: 600000

# ── Configuration par métier ─────────────────────────────────────────────────
# threshold            : nombre d'actions avant que la chance ne débute
# growth-range         : nombre d'actions supplémentaires pour atteindre max-chance
# suspicious-threshold : actions dans la fenêtre avant qu'un WARNING soit loggué
# (EXPLORER uniquement) min-distance : distance minimale du 0,0 en blocs
jobs:
  MINER:
    threshold: 8000
    growth-range: 16000
    suspicious-threshold: 200
    max-chance: 0.000125
  LUMBERJACK:
    threshold: 13000
    growth-range: 26000
    suspicious-threshold: 400
    max-chance: 0.0000769
  FARMER:
    threshold: 30000
    growth-range: 60000
    suspicious-threshold: 1000
    max-chance: 0.0000333
  ENCHANTER:
    threshold: 400
    growth-range: 800
    suspicious-threshold: 40
    max-chance: 0.002778
  FISHERMAN:
    threshold: 1200
    growth-range: 2400
    suspicious-threshold: 40
    max-chance: 0.0008333
  EXPLORER:
    threshold: 1200
    growth-range: 2400
    suspicious-threshold: 50
    max-chance: 0.0008333
    # Distance minimale du point 0,0 (en blocs) pour que le kill compte
    min-distance: 600